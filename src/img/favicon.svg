<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background with rounded corners -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e8fd5"/>
      <stop offset="100%" stop-color="#0e5fa0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- PDF document shape -->
  <rect x="14" y="10" width="28" height="36" rx="3" fill="white" opacity="0.15"/>
  <rect x="12" y="8" width="28" height="36" rx="3" fill="white"/>
  <!-- Fold corner -->
  <path d="M34 8 L40 14 L34 14 Z" fill="#c8dff0"/>
  <rect x="34" y="8" width="6" height="6" rx="1" fill="#a0c4e0"/>
  <!-- Text lines on doc -->
  <line x1="17" y1="20" x2="34" y2="20" stroke="#167bbb" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="17" y1="25" x2="34" y2="25" stroke="#167bbb" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="17" y1="30" x2="28" y2="30" stroke="#167bbb" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Bold "99" badge bottom-right -->
  <circle cx="44" cy="46" r="13" fill="#f08a19"/>
  <text x="44" y="51" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="12" fill="white" text-anchor="middle">99</text>
</svg>
